name: Pull Request Validation

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]

jobs:
  validate-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install

      - name: Check formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Run type checking
        run: npm run type-check

      - name: Run unit tests
        run: npm run test:ci

      - name: Build application
        run: npm run build:prod

      - name: Check for build artifacts
        run: |
          if [ ! -d "dist/incident-web" ]; then
            echo "❌ Build failed - dist directory not found"
            exit 1
          fi
          echo "✅ Build successful - dist directory exists"
          ls -la dist/incident-web/

      - name: Comment PR results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number } = context.issue;
            const comment = `
            ## 🤖 CI Results
            
            ### ✅ Checks Completed:
            - 🔍 **Formatting**: Code is properly formatted
            - 📋 **Linting**: No linting errors found
            - 🔷 **Type Checking**: TypeScript compilation successful
            - 🧪 **Tests**: All tests passing
            - 🏗️ **Build**: Application builds successfully
            
            ### 📊 Coverage Report:
            Coverage reports will be available after test execution.
            
            ---
            *This comment was automatically generated by GitHub Actions*
            `;
            
            github.rest.issues.createComment({
              owner,
              repo,
              issue_number: number,
              body: comment
            });
